{% extends 'bookings/base.html' %}

{% block title %}Book Seat{% endblock %}

{% block content %}
<h2>Book Seat for {{ movie.title }}</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="seat_number" class="form-label">Seat Number</label>
        <input type="number" class="form-control" id="seat_number" name="seat_number" min="1" required>
    </div>
    <button type="submit" class="btn btn-success">Book Seat</button>
</form>
{% endblock %}
