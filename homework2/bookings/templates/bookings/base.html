<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Movie Theater{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #641b1b;">
        <div class="container">
            <!-- Logo on left-->
            <a class="navbar-brand" href="{% url 'movie_list' %}">Home Theater</a>
            <div class="navbar-nav ms-auto">  <!-- Pushes nav links to the right -->
                <!-- Movie link -->
                <a class="nav-link text-white" href="{% url 'movie_list' %}">Movies</a>
                <!-- Booking history link -->
                <a class="nav-link text-white" href="{% url 'booking_history' %}">My Bookings</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
